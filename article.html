<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Author Review | Power Industry Journal</title>
<meta name="description" content="Full author review article from Power Industry Journal." />
<style>
:root{--ink:#17212f;--muted:#5d6878;--line:#d8dee8;--paper:#f7f9fc;--navy:#163a5f;--blue:#2e7bbd;--teal:#0f8b8d;--shadow:0 18px 48px rgba(21,32,47,.14)}*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.58}a{color:inherit}.site-header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:72px;padding:12px clamp(18px,5vw,56px);background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(18px)}.brand{display:inline-flex;align-items:center;gap:12px;text-decoration:none}.brand-mark{display:grid;place-items:center;width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--teal));color:#fff;font-weight:800}.brand strong,.brand small{display:block}.brand small,.meta,.section-intro,.review-section-block p,.ceng-note p{color:var(--muted)}.home-button,.source-link{display:inline-flex;align-items:center;min-height:40px;padding:0 14px;border:1px solid var(--line);border-radius:8px;color:var(--navy);font-weight:800;text-decoration:none}.home-button:hover,.source-link:hover{border-color:var(--blue);color:var(--blue)}main{padding:clamp(34px,6vw,72px) clamp(18px,5vw,56px)}.article-shell{max-width:980px;margin:0 auto}.eyebrow{margin:0 0 10px;color:var(--teal);font-size:.78rem;font-weight:800;text-transform:uppercase}h1{max-width:980px;margin:0 0 16px;font-size:clamp(2.25rem,5vw,4.6rem);line-height:1.04}h4{margin:0 0 8px;color:var(--navy);font-size:1rem}.meta{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}.source-row{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 18px;color:var(--muted)}.topic-art{position:relative;overflow:hidden;max-width:420px;min-height:112px;margin:22px 0;border-radius:8px;background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,0)),linear-gradient(135deg,#1c3358,#2e7bbd)}.topic-art.storage{background:linear-gradient(135deg,#164b60,#4f8f45)}.topic-art span{position:absolute;display:block;background:rgba(255,255,255,.78)}.topic-art span:nth-child(1){left:12%;bottom:18%;width:52%;height:2px;transform:rotate(-10deg)}.topic-art span:nth-child(2){right:18%;bottom:14%;width:2px;height:68%}.topic-art span:nth-child(3){right:12%;bottom:44%;width:28%;height:2px;transform:rotate(18deg)}.article-hero{padding-bottom:26px;border-bottom:1px solid var(--line)}.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:18px 0 14px}.tag-row span{padding:4px 8px;border:1px solid #dfe5ee;border-radius:999px;color:var(--muted);font-size:.78rem}.article-body{display:grid;gap:18px;padding-top:26px}.review-section-block{padding-top:16px;border-top:1px solid var(--line)}.formula{margin:10px 0;padding:12px;border:1px solid #dfe5ee;border-radius:8px;background:var(--paper);font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace;color:var(--navy);overflow-wrap:anywhere}.review-points{display:grid;gap:12px}.review-point{padding-left:14px;border-left:3px solid var(--teal)}.review-point strong{display:block;margin-bottom:4px;color:var(--ink)}.ceng-note{padding-top:14px;border-top:1px solid var(--line)}.ceng-note strong{display:block;margin-bottom:4px;color:var(--navy)}.empty-state{padding:26px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--muted)}@media(max-width:700px){.site-header{align-items:flex-start;flex-direction:column}h1{font-size:clamp(2.35rem,11vw,3.2rem)}}
</style>
</head>
<body>
<header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">PI</span><span><strong>Power Industry Journal</strong><small>Author review</small></span></a><a class="home-button" href="index.html#reviews">Home</a></header>
<main><article class="article-shell" id="article-detail"><p class="empty-state">Loading article...</p></article></main>
<script src="data.js?v=20260609-review-pages"></script>
<script>
const data=window.SITE_DATA||{articles:[]};
const params=new URLSearchParams(location.search);
const article=data.articles.find((item)=>item.slug===params.get('slug'));
const detail=document.querySelector('#article-detail');
const esc=(value)=>String(value??'').replace(/[&<>"']/g,(ch)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
const fmt=(date)=>new Intl.DateTimeFormat('en',{day:'2-digit',month:'short',year:'numeric'}).format(new Date(date));
const tags=(items=[])=>items.map((tag)=>`<span>${esc(tag)}</span>`).join('');
function sections(items=[]){return items.map((section)=>{const body=section.body?`<p>${esc(section.body)}</p>`:'';const paras=section.paragraphs?section.paragraphs.map((p)=>`<p>${esc(p)}</p>`).join(''):'';const formulae=section.formulae?section.formulae.map((f)=>`<div class="formula">${esc(f)}</div>`).join(''):'';const points=section.points?`<div class="review-points">${section.points.map((point)=>`<div class="review-point"><strong>${esc(point.label)}</strong><p>${esc(point.text)}</p></div>`).join('')}</div>`:'';return `<section class="review-section-block"><h4>${esc(section.heading)}</h4>${body}${formulae}${paras}${points}</section>`;}).join('');}
if(!article){detail.innerHTML='<div class="empty-state"><h1>Article not found</h1><p>The requested author review could not be found.</p><a class="home-button" href="index.html#reviews">Home</a></div>';}else{document.title=`${article.title} | Power Industry Journal`;detail.innerHTML=`<header class="article-hero"><p class="eyebrow">Author Review</p><h1>${esc(article.title)}</h1><div class="meta"><span>${article.articleNo?`Article No. ${esc(article.articleNo)}`:esc(article.topic)}</span><span>Updated ${esc(fmt(article.date))}</span><span>${esc(article.topic)}</span><span>${esc(article.readTime||'Read time reserved')}</span></div><p class="source-row"><span>Source:</span><a class="source-link" href="${esc(article.sourceUrl)}" target="_blank" rel="noreferrer">${esc(article.sourceTitle)}</a></p><div class="topic-art ${esc(article.imageTone||'')}"><span></span><span></span><span></span></div><p class="section-intro">${esc(article.excerpt)}</p><div class="tag-row">${tags(article.tags)}</div></header><div class="article-body">${sections(article.sections)}<div class="ceng-note"><strong>CEng angle</strong><p>${esc(article.cengAngle)}</p></div></div>`;}
</script>
</body>
</html>
